    <script>
      const WEB_APP_URL =
        "https://script.google.com/macros/s/AKfycbzE6NtwoJThMxxHP9nLGyzlluIlnPJOnfB83HG5t_2giafOwckB8MeE63KTLcXxeXkuAQ/exec";

      const bodyEl = document.getElementById("submissionsBody");
      const statusEl = document.getElementById("fetchStatus");

      let allSubmissions = [];

      const filterInputs = {
        locationName: document.getElementById("filterLocationName"),
        locationType: document.getElementById("filterLocationType"),
        address: document.getElementById("filterAddress"),
        status: document.getElementById("filterStatus"),
        itemType: document.getElementById("filterItemType"),
      };

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function normalizeText(value) {
        return String(value ?? "").trim().toLowerCase();
      }

      function normalizeWebsiteUrl(value) {
        const raw = String(value ?? "").trim();
        if (!raw) return "";

        const withProtocol = /^https?:\/\//i.test(raw) ? raw : `https://${raw}`;

        try {
          const parsed = new URL(withProtocol);
          if (parsed.protocol !== "http:" && parsed.protocol !== "https:") {
            return "";
          }
          return parsed.href;
        } catch {
          return "";
        }
      }

      function normalizeImageUrl(value) {
        const raw = String(value ?? "").trim();
        if (!raw) return "";

        if (!/^https?:\/\//i.test(raw)) {
          return "";
        }

        try {
          const parsed = new URL(raw);
          if (parsed.protocol !== "http:" && parsed.protocol !== "https:") {
            return "";
          }
          return parsed.href;
        } catch {
          return "";
        }
      }

      function parsePhotoUrls(submission) {
        const fromSingleFields = [
          submission?.photo1,
          submission?.photo2,
          submission?.photo3,
          submission?.photoUrl1,
          submission?.photoUrl2,
          submission?.photoUrl3,
          submission?.image1,
          submission?.image2,
          submission?.image3,
        ];

        const aggregateField =
          submission?.photoUrls ??
          submission?.photoURLs ??
          submission?.photos ??
          submission?.imageUrls ??
          submission?.images;

        let fromAggregate = [];
        if (Array.isArray(aggregateField)) {
          fromAggregate = aggregateField;
        } else if (typeof aggregateField === "string") {
          const trimmed = aggregateField.trim();
          if (trimmed) {
            try {
              const parsed = JSON.parse(trimmed);
              if (Array.isArray(parsed)) {
                fromAggregate = parsed;
              } else {
                fromAggregate = trimmed.split(/[\n,]/g);
              }
            } catch {
              fromAggregate = trimmed.split(/[\n,]/g);
            }
          }
        }

        return [...fromAggregate, ...fromSingleFields]
          .map((url) => normalizeImageUrl(url))
          .filter(Boolean)
          .slice(0, 6);
      }

      function getTimeAgo(dateString) {
        if (!dateString) return "";
        
        try {
          const date = new Date(dateString);
          const now = new Date();
          
          // Calculate difference in days
          const diffTime = now - date;
          const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
          
          if (diffDays === 0) return "today";
          if (diffDays === 1) return "1 day ago";
          if (diffDays < 7) return `${diffDays} days ago`;
          if (diffDays < 30) {
            const weeks = Math.floor(diffDays / 7);
            return weeks === 1 ? "1 week ago" : `${weeks} weeks ago`;
          }
          if (diffDays < 365) {
            const months = Math.floor(diffDays / 30);
            return months === 1 ? "1 month ago" : `${months} months ago`;
          }
          const years = Math.floor(diffDays / 365);
          return years === 1 ? "1 year ago" : `${years} years ago`;
        } catch {
          return dateString;
        }
      }

      function isReadySubmission(submission) {
        const candidateFields = [
          submission?.ready,
          submission?.readyFlag,
          submission?.readyStatus,
          submission?.columnS,
          submission?.colS,
          submission?.["Ready?"],
          submission?.status,
        ];

        return candidateFields.some((value) => {
          const normalized = normalizeText(value);
          return normalized === "ready" || normalized === "yes";
        });
      }



      function renderRows(submissions) {
        if (!Array.isArray(submissions) || submissions.length === 0) {
          bodyEl.innerHTML = '<tr><td colspan="5">No submissions yet.</td></tr>';
          return;
        }

        // Debug: log first submission to check data
        if (submissions.length > 0) {
          console.log("First submission data:", submissions[0]);
          console.log("Google Maps Link:", submissions[0].googleMapsLink);
        }

        bodyEl.innerHTML = submissions
          .map((s, index) => {
            const locationName = escapeHtml(s.locationName);
            const websiteUrl = normalizeWebsiteUrl(
              s.website || s.locationWebsite || s.url || s.link
            );

            const linkedLocationName = websiteUrl
              ? `<a href="${escapeHtml(websiteUrl)}" target="_blank" rel="noopener noreferrer">${locationName}</a>`
              : locationName;

            const locationAddress = escapeHtml(s.locationAddress);
            const mapsUrl = s.googleMapsLink || s.mapsLink || s.mapUrl || "";
            
            const linkedAddress = mapsUrl
              ? `<a href="${escapeHtml(mapsUrl)}" target="_blank" rel="noopener noreferrer">${locationAddress}</a>`
              : locationAddress;

            return `
            <tr class="submission-row" data-index="${index}">
              <td><strong>${linkedLocationName}</strong></td>
              <td>${escapeHtml(s.locationType)}</td>
              <td>${linkedAddress}</td>
              <td>${escapeHtml(s.status)}</td>
              <td>${escapeHtml(s.itemType)}</td>
            </tr>
          `;
          })
          .join("");

        // Add click listeners to rows
        document.querySelectorAll(".submission-row").forEach((row) => {
          row.addEventListener("click", () => {
            const index = parseInt(row.dataset.index, 10);
            showDetails(submissions[index]);
          });
        });
      }

      function showDetails(submission) {
        const panel = document.getElementById("detailsPanel");
        const content = document.getElementById("detailsContent");

        const websiteUrl = normalizeWebsiteUrl(
          submission.website || submission.locationWebsite || submission.url || submission.link
        );

        let detailsHtml = websiteUrl 
          ? `<h2><a href="${escapeHtml(websiteUrl)}" target="_blank" rel="noopener noreferrer" style="color: #390606; text-decoration: none;">${escapeHtml(submission.locationName)}<span class="link-icon">↗</span></a></h2>`
          : `<h2>${escapeHtml(submission.locationName)}</h2>`;

        const photoUrls = parsePhotoUrls(submission);

        const photoGalleryHtml = photoUrls.length
          ? photoUrls
              .map(
                (url) => `
              <a class="photo-item" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" aria-label="Open photo in new tab">
                <img src="${escapeHtml(url)}" alt="Submission photo" loading="lazy" />
              </a>
            `
              )
              .join("")
          : `
              <div class="photo-item">
                <div class="photo-placeholder">feature coming soon</div>
              </div>
              <div class="photo-item">
                <div class="photo-placeholder">feature coming soon</div>
              </div>
            `;

        // Photo gallery
        detailsHtml += `
          <div class="photo-gallery">
            <div class="photo-gallery-title">Photos</div>
            <div class="photo-grid">
              ${photoGalleryHtml}
            </div>
          </div>
        `;

        // Status and Last Confirmation on same line (at the top)
        if (submission.status || submission.dateFound) {
          detailsHtml += `<div class="detail-row">`;
          
          if (submission.status) {
            detailsHtml += `
              <div class="detail-item">
                <div class="detail-label">Status</div>
                <div class="detail-value">${escapeHtml(submission.status)}</div>
              </div>
            `;
          }
          
          if (submission.dateFound) {
            detailsHtml += `
              <div class="detail-item">
                <div class="detail-label">Last Confirmation</div>
                <div class="detail-value">${getTimeAgo(submission.dateFound)}</div>
              </div>
            `;
          }
          
          detailsHtml += `</div>`;
        }

        // Location Type and Item Type on same line
        if (submission.locationType || submission.itemType) {
          detailsHtml += `<div class="detail-row">`;
          
          if (submission.locationType) {
            detailsHtml += `
              <div class="detail-item">
                <div class="detail-label">Location Type</div>
                <div class="detail-value">${escapeHtml(submission.locationType)}</div>
              </div>
            `;
          }
          
          if (submission.itemType) {
            detailsHtml += `
              <div class="detail-item">
                <div class="detail-label">Item Type</div>
                <div class="detail-value">${escapeHtml(submission.itemType)}</div>
              </div>
            `;
          }
          
          detailsHtml += `</div>`;
        }

        // Address
        if (submission.locationAddress) {
          const mapsUrl = submission.googleMapsLink || submission.mapsLink || submission.mapUrl || "";
          const addressHtml = mapsUrl
            ? `<a href="${escapeHtml(mapsUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(submission.locationAddress)}</a>`
            : escapeHtml(submission.locationAddress);
          
          detailsHtml += `
            <div class="detail-item">
              <div class="detail-label">Address</div>
              <div class="detail-value">${addressHtml}</div>
            </div>
          `;
        }

        // Website
        if (websiteUrl) {
          detailsHtml += `
            <div class="detail-item">
              <div class="detail-label">Website</div>
              <div class="detail-value"><a href="${escapeHtml(websiteUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(submission.website || submission.locationWebsite || submission.url || submission.link)}</a></div>
            </div>
          `;
        }

        // Notes
        detailsHtml += `
          <div class="detail-item">
            <div class="detail-label">Notes</div>
            <div class="detail-value">${submission.notes ? escapeHtml(submission.notes) : "no notes available"}</div>
          </div>
        `;

        // Action buttons
        detailsHtml += `
          <div class="detail-actions">
            <button class="action-btn action-btn-primary" onclick="uploadPhotos()">
              upload photos
            </button>
            <button class="action-btn action-btn-secondary" onclick="updateStatus()">
              update availability
            </button>
            <button class="action-btn action-btn-secondary" onclick="addNote()">
              add a note
            </button>
          </div>
        `;

        content.innerHTML = detailsHtml;
        panel.classList.add("open");
      }

      function closeDetails() {
        const panel = document.getElementById("detailsPanel");
        panel.classList.remove("open");
      }

      function resetFilters() {
        Object.values(filterInputs).forEach((input) => {
          input.value = "";
        });
        applyFilters();
      }

      function applyFilters() {
        // Update select styling based on whether they have values
        Object.entries(filterInputs).forEach(([key, input]) => {
          if (input.tagName === 'SELECT') {
            if (input.value) {
              input.classList.add('has-value');
            } else {
              input.classList.remove('has-value');
            }
          }
        });

        const filtered = allSubmissions.filter((s) => {
          const locationNameMatch = normalizeText(s.locationName).includes(
            normalizeText(filterInputs.locationName.value)
          );
          const locationTypeMatch = normalizeText(s.locationType).includes(
            normalizeText(filterInputs.locationType.value)
          );
          const addressMatch = normalizeText(s.locationAddress).includes(
            normalizeText(filterInputs.address.value)
          );
          const selectedStatus = normalizeText(filterInputs.status.value);
          const statusMatch =
            !selectedStatus || normalizeText(s.status) === selectedStatus;
          const selectedItemType = normalizeText(filterInputs.itemType.value);
          const itemTypeMatch =
            !selectedItemType || normalizeText(s.itemType) === selectedItemType;

          return (
            locationNameMatch &&
            locationTypeMatch &&
            addressMatch &&
            statusMatch &&
            itemTypeMatch
          );
        });

        renderRows(filtered);
      }

      async function loadSubmissions() {
        statusEl.textContent = "Loading...";
        statusEl.className = "status-row status-loading";

        try {
          const res = await fetch(WEB_APP_URL, {
            method: "POST",
            body: JSON.stringify({ action: "getSubmissions" }),
          });

          const text = await res.text();
          const data = JSON.parse(text);

          if (!res.ok || data.error) {
            throw new Error(data.error || `HTTP ${res.status}`);
          }

          const submissions = data.submissions || [];
          const readySubmissions = submissions.filter(isReadySubmission);

          allSubmissions = readySubmissions;
          renderRows(allSubmissions);

          if (submissions.length > 0 && readySubmissions.length === 0) {
            statusEl.textContent =
              "Loaded data, but no rows are marked ready. (If this seems wrong, redeploy Apps Script with column S mapping.)";
            statusEl.className = "status-row status-loading";
          } else {
            statusEl.textContent = "";
            statusEl.className = "status-row status-ok";
            
            // Automatically show details for the first submission
            if (allSubmissions.length > 0) {
              showDetails(allSubmissions[0]);
            }
          }
        } catch (err) {
          bodyEl.innerHTML =
            '<tr><td colspan="4">Unable to load submissions.</td></tr>';
          statusEl.textContent = `Error: ${err.message}`;
          statusEl.className = "status-row status-error";
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        const nav = document.querySelector(".home-nav");
        const menuToggle = document.querySelector(".menu-toggle");
        if (nav && menuToggle) {
          const closeMenu = () => {
            nav.classList.remove("nav-open");
            menuToggle.setAttribute("aria-expanded", "false");
          };

          menuToggle.addEventListener("click", (event) => {
            event.stopPropagation();
            const isOpen = nav.classList.toggle("nav-open");
            menuToggle.setAttribute("aria-expanded", String(isOpen));
          });

          document.addEventListener("click", (event) => {
            if (!nav.contains(event.target)) closeMenu();
          });

          nav.querySelectorAll(".nav-menu a").forEach((link) => {
            link.addEventListener("click", () => {
              if (window.innerWidth <= 1024) closeMenu();
            });
          });

          window.addEventListener("resize", () => {
            if (window.innerWidth > 1024) closeMenu();
          });
        }

        loadSubmissions();

        Object.values(filterInputs).forEach((input) => {
          input.addEventListener("input", applyFilters);
          input.addEventListener("change", applyFilters);
        });

        document.getElementById("resetFiltersBtn").addEventListener("click", resetFilters);
        document.getElementById("closeDetailsBtn").addEventListener("click", closeDetails);
        document.getElementById("detailsPanel").addEventListener("click", (e) => {
          if (e.target.id === "detailsPanel") {
            closeDetails();
          }
        });
      });
    </script>
