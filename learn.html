<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>the match parlor - Home</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* Home page specific styles */
      .home-container {
        position: relative;
        width: 100%;
        min-height: 100vh;
        background: #ffffff;
      }

      /* Top nav bar - maroon */
      .home-nav {
        position: fixed;
        top: 40px;
        left: 0;
        width: 100%;
        height: 30px;
        background: #390606;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 4%;
        box-sizing: border-box;
        z-index: 1000;
      }

      /* the match parlor logo button */
      .matchfolio-logo {
        position: absolute;
        left: 4%;
        background: url("images/logocorner.png") center / cover no-repeat;;;
        border: 0px;
        border-radius: 0px;
        padding: 2px 15px;
        text-decoration: none;
        color: #390606;
        font-family: "comfortaa", sans-serif;
        font-size: 40px;
        font-weight: 300;
        transition: all 0.25s ease;
      }

      .matchfolio-logo:hover {
        background: url("images/logocorner.png") center / cover no-repeat;;;
      }

      /* Navigation menu */
      .nav-menu {
        position: absolute;
        left: calc(4% + 340px);
        right: calc(4% + 15px);
        display: flex;
        justify-content: flex-end;
        gap: clamp(16px, 4vw, 80px);
        align-items: center;
        white-space: nowrap;
      }

      .nav-menu a {
        color: #ffffff;
        text-decoration: none;
        font-family: "eb", sans-serif;
        font-size: 20px;
        font-weight: 50;
        transition: opacity 0.2s ease;
        padding: 4px 12px;
        border: 2px solid transparent;
        border-radius: 6px;
      }

      .nav-menu a:hover {
        opacity: 0.8;
      }

      /* Active/highlighted nav link */
      .nav-menu a.active {
        background: transparent;
        color: #ffffff;
        border-color: transparent;
      }

      .nav-menu a.active:hover {
        background: transparent;
        opacity: 0.8;
      }

      /* Dropdown menu for find */
      .nav-item {
        position: relative;
      }

      .dropdown {
        display: none;
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        background: #390606;
        border: 2px solid #390606;
        border-radius: 6px;
        margin-top: 4px;
        min-width: 150px;
        z-index: 1001;
      }

      .nav-item:hover .dropdown {
        display: flex;
        flex-direction: column;
      }

      .dropdown a {
        color: #ffffff;
        padding: 10px 16px;
        text-decoration: none;
        font-family: "eb", sans-serif;
        font-size: 16px;
        font-weight: 50;
        border: none;
        border-radius: 0;
        transition: opacity 0.2s ease;
      }

      .dropdown a:first-child {
        border-radius: 4px 4px 0 0;
      }

      .dropdown a:last-child {
        border-radius: 0 0 4px 4px;
      }

      .dropdown a:hover {
        background: #390606;
        opacity: 1;
      }

      .menu-toggle {
        display: none;
        margin-left: auto;
        margin-bottom: 5px;
        padding: 0;
        border: none;
        background: transparent;
        color: #ffffff;
        font-size: 32px;
        line-height: 1;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      @media (max-width: 1024px) {
        .home-nav {
          --mobile-nav-height: calc(30px * 0.93);
          height: var(--mobile-nav-height);
          justify-content: flex-end;
        }

        .matchfolio-logo {
          height: calc(var(--mobile-nav-height) *1.2);
          display: flex;
          align-items: center;
          box-sizing: border-box;
          font-size: 30px;
          border: 0px;
          border-radius: 0px;
          padding: 2px 15px;
          max-width: calc(100% - 100px);
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .menu-toggle {
          display: inline-flex;
        }

        .nav-menu {
          display: none;
          position: absolute;
          top: calc(100% + 8px);
          left: 4%;
          right: 4%;
          background: #390606;
          border: 1px solid #390606;
          border-radius: 8px;
          padding: 8px;
          flex-direction: column;
          align-items: stretch;
          gap: 4px;
          z-index: 1002;
        }

        .home-nav.nav-open .nav-menu {
          display: flex;
        }

        .nav-menu > a,
        .nav-item > a {
          display: block;
          width: 100%;
          padding: 10px 12px;
          font-size: 18px;
        }

        .nav-item {
          width: 100%;
        }

        .dropdown {
          display: flex;
          flex-direction: column;
          position: static;
          transform: none;
          border: none;
          background: transparent;
          margin-top: 0;
          min-width: 0;
          padding-left: 12px;
        }

        .dropdown a {
          color: #fff3f2;
          font-size: 15px;
          padding: 8px 12px;
        }
      }

      /* Footer bar - maroon */
      .enter-footer {
        position: fixed;
        bottom: 40px;
        left: 0;
        width: 100%;
        height: 30px;
        background: #390606;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Bottom gray line */
      .bottom-line {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 132px;
        height: 3px;
        background: #4b4b4b;
        z-index: 50;
      }

      /* Hide any content below footer bar */
      .footer-mask {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: 40px;
        background: #ffffff;
        z-index: 49;
        pointer-events: none;
      }

      /* Learn page specific styles */
      .learn-content {
        display: flex;
        flex-direction: column;
        position: absolute;
        top: 100px;
        left: 0;
        right: 0;
        bottom: 80px;
        overflow-y: auto;
        padding: 0 4%;
      }

      .learn-container {
        width: 100%;
        max-width: 1342px;
        margin: 0 auto;
        padding: 10px 0px 0px 0px;
      }

      .learn-box {
        background: #ffffff;
        border: 1px solid #390606;
        border-radius: 6px;
        padding: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 30px;
        width: 100%;
        margin-top: 30px;
      }

      .learn-box-title {
        font-family: "comfortaa", sans-serif;
        font-size: 30px;
        font-weight: 300;
        color: #390606;
        text-align: center;
        line-height: normal;
      }

      /* Article Carousel Styles */
      .articles-section {
        position: relative;
        top: 30px;
        width: 100%;
        max-width: 1342px;
        margin: 0 auto;
        padding: 40px 0px 0px 0px;
        display: flex;
        align-items: center;
        gap: 15px;
        flex: 1;
        margin-top: auto;
        margin-bottom: 0px;
      }

      .carousel-arrow {
        background: #390606 url("images/sketchbackground.png") center / cover no-repeat;;
        border: 1px solid #ffffff;
        border-radius: 999px;
        width: 44px;
        height: 44px;
        color: #ffffff;
        font-size: 26px;
        font-weight: 200;
        line-height: 1;
        cursor: pointer;
        display: grid;
        place-items: center;
        padding: 0;
        transition: opacity 0.2s, transform 0.2s;
        flex-shrink: 0;
      }

      .carousel-arrow span {
        display: block;
        line-height: 1;
        transform: translateY(-1px);
      }

      .carousel-arrow:hover {
        opacity: 0.7;
      }

      .carousel-arrow:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .articles-container {
        flex: 1;
        overflow: hidden;
      }

      .articles-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
      }

      .article-card {
        background: #ffffff;
        border: 1px solid #000000;
        border-radius: 6px;
        padding: 0;
        display: flex;
        flex-direction: column;
        aspect-ratio:10 / 15;
        min-height: 60%;
        max-height: 70%;
        cursor: pointer;
        transition: transform 0.2s;
        position: relative;
        z-index: 1;
        transform-style: preserve-3d;
        perspective: 1200px;
        width: 80%;
        justify-self: center;
      }

      .article-card:hover {
        transform: translateY(4px);
      }

      .article-lid {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 80%;
        background: #390606 url("images/sketchbackground.png") center / cover no-repeat;
        border-bottom: 1px solid #390606;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-end;
        overflow: hidden;
        box-shadow: 0 10px 12px rgba(0, 0, 0, 0.2);
        transform-origin: top center;
        transform: rotateX(0deg);
        transition: transform 0.45s ease;
        z-index: 2;
      }

      .article-card:hover .article-lid {
        transform: rotateX(65deg);
      }

      .article-body {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .article-matchsticks {
        position: absolute;
        top: calc(80% - 189px);
        left: 16px;
        right: 16px;
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 6px;
        z-index: 1;
        pointer-events: none;
      }

      .article-matchsticks img {
        width: 100%;
        height: 189px;
        object-fit: contain;
        opacity: 0.9;
        filter: drop-shadow(6px 6px 6px rgba(0, 0, 0, 0.25));
      }


      .article-title {
        font-family: "comfortaa", sans-serif;
        font-size: 28px;
        font-weight: 300;
        color: #ffffff;
        width: 100%;
        padding: 0 20px 18px 20px;
        text-align: left;
        line-height: 1.3;
        position: relative;
        z-index: 1;
      }

      .article-bottom-line {
        position: absolute;
        bottom: 15px;
        left: 50%;
        transform: translateX(-50%);
        width: 15%;
        height: 3px;
        background: #303030;
        z-index: 4;
      }

      .article-maroon-line {
        position: absolute;
        bottom: 30px;
        left: 0;
        width: 100%;
        height: 30px;
        background: #390606 url("images/sketchbackground.png") center / cover no-repeat;
        z-index: 5;
      }

      @media (max-width: 1024px) {
        .articles-grid {
          grid-template-columns: 1fr;
        }

        .article-card {
          width: min(100%, 420px);
        }
      }

      @media (max-width: 768px) {
        .learn-content {
          top: 80px;
        }
      }
    </style>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  </head>

  <body>
    <div class="home-container">
      <!-- Top Nav Bar -->
      <nav class="home-nav" data-name="top bar">
        <a href="index.html" class="matchfolio-logo">the match parlor</a>
        <button class="menu-toggle" type="button" aria-label="Toggle navigation menu" aria-expanded="false">☰</button>
        <div class="nav-menu">
          <div class="nav-item">
            <a href="home.html">home</a>
            <div class="dropdown">
              <a href="contact.html">contact us</a>
            </div>
          </div>
         <div class="nav-item">
            <a href="find.html">find matches</a>
            <div class="dropdown">
              <a href="find.html?type=search">list of matches</a>
              <a href="map.html">map of matches</a>
              <a href="trade.html" class="active">trade matches</a>
            </div>
          </div>
          <a href="share.html">share a find</a>
          <div class="nav-item">
            <a href="learn.html" class="active">learn</a>
            <div class="dropdown">
              <a href="learn.html?type=articles">articles</a>
              <a href="collector-resources.html">collector resources</a>
            </div>
          </div>
        </div>
      </nav>

      <!-- Main Content -->
      <main class="learn-content">
        <div class="learn-container">
          <div class="learn-box">
            <p class="learn-box-title">learn about the hobby</p>
          </div>
        </div>

        <div class="articles-section">
          <button class="carousel-arrow" id="prevBtn" aria-label="Previous articles"><span>‹</span></button>
          
          <div class="articles-container">
            <div class="articles-grid" id="articlesGrid">
              <!-- Articles will be populated here -->
            </div>
          </div>

          <button class="carousel-arrow" id="nextBtn" aria-label="Next articles"><span>›</span></button>
        </div>
      </main>

      <!-- Bottom Bar Footer -->
      <footer class="enter-footer" data-name="bottom bar">
      </footer>

      <div class="footer-mask" aria-hidden="true"></div>

      <!-- Bottom gray line -->
      <div class="bottom-line"></div>
    </div>

    <script>
      // Sample articles data
      const articles = [
        { id: 1, title: "history of matchbook advertising" },
        { id: 2, title: "collecting matchbooks for beginners" },
        { id: 3, title: "rare matchbook finds and identification" },
      ];

      let currentIndex = 0;

      function getArticlesPerPage() {
        return window.innerWidth <= 1024 ? 1 : 3;
      }

      function renderArticles() {
        const grid = document.getElementById('articlesGrid');
        grid.innerHTML = '';
        const articlesPerPage = getArticlesPerPage();

        for (let i = 0; i < articlesPerPage; i++) {
          const articleIndex = (currentIndex + i) % articles.length;
          const article = articles[articleIndex];

          const card = document.createElement('div');
          card.className = 'article-card';
          card.innerHTML = `
            <div class="article-lid">
              <div class="article-title">${article.title}</div>
            </div>
            <div class="article-matchsticks">
              <img src="images/matchstickclear.jpg" alt="matchstick" />
              <img src="images/matchstickclear.jpg" alt="matchstick" />
              <img src="images/matchstickclear.jpg" alt="matchstick" />
              <img src="images/matchstickclear.jpg" alt="matchstick" />
              <img src="images/matchstickclear.jpg" alt="matchstick" />
              <img src="images/matchstickclear.jpg" alt="matchstick" />
              <img src="images/matchstickclear.jpg" alt="matchstick" />
              <img src="images/matchstickclear.jpg" alt="matchstick" />
            </div>
            <div class="article-divider"></div>
            <div class="article-body">
              <div class="article-image"></div>
              <div class="article-footer"></div>
            </div>
            <div class="article-maroon-line"></div>
            <div class="article-bottom-line"></div>
          `;
          grid.appendChild(card);
        }

        updateArrowStates();
      }

      function updateArrowStates() {
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        
        // Enable/disable based on whether we can move in each direction
        prevBtn.disabled = false;
        nextBtn.disabled = false;
      }

      document.getElementById('prevBtn').addEventListener('click', () => {
        currentIndex = (currentIndex - 1 + articles.length) % articles.length;
        renderArticles();
      });

      document.getElementById('nextBtn').addEventListener('click', () => {
        currentIndex = (currentIndex + 1) % articles.length;
        renderArticles();
      });

      window.addEventListener('resize', () => {
        currentIndex = currentIndex % articles.length;
        renderArticles();
      });

      // Add click handlers for articles
      document.addEventListener('click', (e) => {
        if (e.target.closest('.article-card')) {
          const card = e.target.closest('.article-card');
          const articleId = card.dataset.articleId || 'matchbook-history';
          const articleTitle = card.querySelector('h3')?.textContent || 'Article';
          window.location.href = `article.html?id=${articleId}&title=${encodeURIComponent(articleTitle)}`;
        }
      });

      // Initial render
      renderArticles();

      (() => {
        const nav = document.querySelector(".home-nav");
        const menuToggle = document.querySelector(".menu-toggle");
        if (!nav || !menuToggle) return;

        const closeMenu = () => {
          nav.classList.remove("nav-open");
          menuToggle.setAttribute("aria-expanded", "false");
        };

        menuToggle.addEventListener("click", (event) => {
          event.stopPropagation();
          const isOpen = nav.classList.toggle("nav-open");
          menuToggle.setAttribute("aria-expanded", String(isOpen));
        });

        document.addEventListener("click", (event) => {
          if (!nav.contains(event.target)) closeMenu();
        });

        nav.querySelectorAll(".nav-menu a").forEach((link) => {
          link.addEventListener("click", () => {
            if (window.innerWidth <= 1024) closeMenu();
          });
        });

        window.addEventListener("resize", () => {
          if (window.innerWidth > 1024) closeMenu();
        });
      })();
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </body>
</html>
