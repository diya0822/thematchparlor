      /* Top nav bar - maroon */

      /* Navigation menu */

      }

      .typing-cursor.typing-cursor--done {
        animation: none;
        border-color: transparent;
      }

      @keyframes blink {

        }

          <div class="tracker-label">countries represented</div>
        </div>
        <div class="home-header">
          <h1 class="home-title typing" data-text="matchbooks, organized">
            <span class="typing-text"></span>
            <span class="typing-cursor" aria-hidden="true"></span>
          </h1>

            the match parlor is an archive that makes finding and trading matches easier than ever, powered by collectors like you.

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const title = document.querySelector(".home-title.typing");
        if (!title) {
          return;
        }
        const textSpan = title.querySelector(".typing-text");
        const cursor = title.querySelector(".typing-cursor");
        if (!textSpan) {
          return;
        }
        const text = title.getAttribute("data-text") || "";
        textSpan.textContent = "";
        let index = 0;

        const typeNext = () => {
          if (index <= text.length) {
            textSpan.textContent = text.slice(0, index);
            index += 1;
            setTimeout(typeNext, 120);
          } else if (cursor) {
            setTimeout(() => {
              cursor.classList.add("typing-cursor--done");
            }, 3000);
          }
        };

        typeNext();
      });

      (() => {
        const nav = document.querySelector(".home-nav");
        const menuToggle = document.querySelector(".menu-toggle");
        if (!nav || !menuToggle) return;

        const closeMenu = () => {
          nav.classList.remove("nav-open");
          menuToggle.setAttribute("aria-expanded", "false");
        };

        menuToggle.addEventListener("click", (event) => {
          event.stopPropagation();
          const isOpen = nav.classList.toggle("nav-open");
          menuToggle.setAttribute("aria-expanded", String(isOpen));
        });

        document.addEventListener("click", (event) => {
          if (!nav.contains(event.target)) closeMenu();
        });

        nav.querySelectorAll(".nav-menu a").forEach((link) => {
          link.addEventListener("click", () => {
            if (window.innerWidth <= 1024) closeMenu();
          });
        });

        window.addEventListener("resize", () => {
          if (window.innerWidth > 1024) closeMenu();
        });
      })();
    </script>
