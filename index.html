  <head>
    <meta charset="UTF-8" />

    <title>the match parlor - Enter</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* Enter page specific styles */
      .enter {
        position: relative;
        width: 100%;
        height: 100vh;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        --viewport-height: 100vh;
        --header-height: 140px;
        --footer-offset: 40px;
        --footer-height: 30px;
        --gallery-track-start: var(--header-height);
        --gallery-track-end: calc(var(--viewport-height) - (var(--footer-offset) + var(--footer-height)));
        --gallery-edge-gap: 24px;
        --gallery-image-height: clamp(124px, 13vh, 195px);
        --gallery-safe-top: calc(var(--gallery-track-start) + var(--gallery-edge-gap) + (var(--gallery-image-height) / 2));
        --gallery-safe-bottom: calc(var(--gallery-track-end) - var(--gallery-edge-gap) - (var(--gallery-image-height) / 2));
        --gallery-row-step: calc((var(--gallery-safe-bottom) - var(--gallery-safe-top)) / 2);
        --gallery-row-spacing-scale: 1.3;
      }

      @supports (height: 100dvh) {
        .enter {
          height: 100dvh;
          --viewport-height: 100dvh;
        }
      }

      .enter-header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 140px;
        background: #390606;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .enter-header-content {
        text-align: center;
        color: #ffffff;
        width: 100%;
      }

      .enter-title {
        font-family: "comfortaa", sans-serif;
        font-size: 50px;
        font-weight: 300;
        margin: 0;
        padding: 0;
        line-height: 1;
      }

      .enter-subtitle {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 30px;
        font-weight: 200;
        margin: 8px 0 0 0;
        padding: 0;
        letter-spacing: 0.5px;
      }

      .enter-content {
        flex: 1;
        margin-top: 179px;
        margin-bottom: 50px;
      }

      .enter-footer {
        position: fixed;
        bottom: 40px;
        left: 0;
        width: 100%;
        height: 30px;
        background: #390606;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .enter-footer-text {
        font-family: "comfortaa", sans-serif;
        font-size: 30px;
        font-weight: 300;
        color: #390606;
        margin: 0;
        padding: 12px 20px;
        text-align: center;
        background: #ffffff;
        text-decoration: none;
        display: inline-block;
        cursor: pointer;
      }

      /* Keep gallery rows evenly spaced between fixed header and fixed footer */
      .gallery {
        top: var(--gallery-safe-top);
        transform: translateY(-50%);
        gap: clamp(40px, 1vw, 50px);
      }

      .gallery-second {
        top: calc(var(--gallery-safe-top) + var(--gallery-row-step));
      }

      .gallery-third {
        top: var(--gallery-safe-bottom);
      }

      .gallery img {
        height: var(--gallery-image-height);
      }

      @media (max-width: 1024px) {
        .enter-title {
          font-size: 44px;
        }

        .enter-subtitle {
          font-size: 24px;
        }

        .enter-footer-text {
          font-size: 36px;
          padding: 14px 24px;
        }

        .enter {
          --gallery-image-height: clamp(179px, 19.8vh, 281px);
        }

        .gallery img {
          height: var(--gallery-image-height);
        }
      }

      @media (max-width: 768px) {
        .enter-title {
          font-size: 38px;
        }

        .enter-subtitle {
          font-size: 20px;
          margin-top: 6px;
        }

        .enter-footer-text {
          font-size: 29px;
          padding: 12px 19px;
        }

        .enter {
          --gallery-image-height: clamp(149px, 18.15vh, 228px);
        }

        .gallery {
          gap: 12px;
        }

        .gallery img {
          height: var(--gallery-image-height);
        }
      }

      @media (max-width: 480px) {
        .enter {
          --gallery-image-height: clamp(122px, 17.325vh, 182px);
        }

        .enter-title {
          font-size: 34px;
        }

        .enter-subtitle {
          font-size: 18px;
        }

        .enter-footer-text {
          font-size: 26px;
          padding: 11px 17px;
        }
      }

      /* Decorative images */
      .enter-image-left {
        position: absolute;
        left: -180px;
        top: 199px;
        width: 141.19px;
        height: 167.815px;
        overflow: hidden;
      }

      .enter-image-left img {
        width: 296%;
        height: 100%;
        object-fit: cover;
        margin-left: -97.14%;
      }

      .enter-image-left-bottom {
        position: absolute;
        left: -209px;
        bottom: 50px;
        width: 147px;
        height: 175px;
        overflow: hidden;
      }

      .enter-image-left-bottom img {
        width: 296%;
        height: 100%;
        object-fit: cover;
        margin-left: -97.14%;
      }

      .bottom-line {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 132px;
        height: 3px;
        background: #4b4b4b;
        z-index: 50;
      }

      /* Hide any content below footer bar */
      .footer-mask {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: 40px;
        background: #ffffff;
        z-index: 49;
        pointer-events: none;
      }

      body {
        transition: opacity 0.5s ease;
      }

      body.fade-out {
        opacity: 0;
      }
    </style>
  </head>
